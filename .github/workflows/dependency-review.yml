name: Dependency Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "apps/**/package.json"
      - ".github/workflows/dependency-review.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-validation:
    name: Validate dependency manifests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Prepare dependency lock data
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            echo "Using committed package-lock.json"
          else
            echo "::warning file=package.json::package-lock.json is not committed; generating a temporary lockfile for validation."
            npm install --package-lock-only --ignore-scripts
          fi

      - name: Validate dependency tree
        run: npm install --package-lock-only --ignore-scripts

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
