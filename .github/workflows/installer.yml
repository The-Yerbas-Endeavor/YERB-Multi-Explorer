name: Installer Checks

on:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/installer.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/installer.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: installer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-installer:
    name: Validate Ubuntu installer
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check Bash syntax
        run: bash -n scripts/install-ubuntu26.sh

      - name: Run ShellCheck
        run: shellcheck -x scripts/install-ubuntu26.sh
