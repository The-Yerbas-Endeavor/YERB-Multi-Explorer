name: Security Audit

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "apps/**/package.json"
      - ".github/workflows/security-audit.yml"
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "apps/**/package.json"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "43 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit production dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require package lock
        run: |
          test -f package-lock.json || {
            echo "::error file=package.json::Commit package-lock.json before enabling reproducible security audits."
            exit 1
          }

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
