name: Security Audit

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "apps/**/package.json"
      - ".github/workflows/security-audit.yml"
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "apps/**/package.json"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "43 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit production dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Prepare dependency lock data
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            echo "Using committed package-lock.json"
          else
            echo "::warning file=package.json::package-lock.json is not committed; generating a temporary lockfile for this audit. Commit the generated lockfile for reproducible CI installs."
            npm install --package-lock-only --ignore-scripts
          fi

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
