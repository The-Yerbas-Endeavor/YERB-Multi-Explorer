server {
    listen 80;
    listen [::]:80;

    server_name explorer.yerbas.org;

    # Main Node.js blockchain explorer
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Yerbas asset explorer mounted beneath the main explorer.
    location ^~ /assets/ {
        alias /opt/yerbas-multi-explorer/apps/assets/;
        index index.php index.html;
        try_files $uri $uri/ /assets/index.php?$query_string;
    }

    location ~ ^/assets/(.+\.php)$ {
        alias /opt/yerbas-multi-explorer/apps/assets/$1;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/yerbas-multi-explorer/apps/assets/$1;
        fastcgi_param SCRIPT_NAME /assets/$1;
        fastcgi_pass unix:/run/php/yerbas-assets-fpm.sock;
    }

    location ^~ /assets/storage/ { deny all; }
    location ^~ /assets/src/ { deny all; }
    location ^~ /assets/scripts/ { deny all; }
    location ^~ /assets/deploy/ { deny all; }
    location ~ /\. { deny all; }

    access_log /var/log/nginx/yerbas-multi-explorer-access.log;
    error_log /var/log/nginx/yerbas-multi-explorer-error.log;
}
